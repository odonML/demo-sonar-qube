name: config sonar
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
            fetch-depth: 0
      - name: Set Quality Gate
        run: |
          FULL_REPO=${GITHUB_REPOSITORY}
          REPO_NAME=${FULL_REPO#*/}

          GATE_NAME=$REPO_NAME
          SONAR_ORGANIZATION="${{ secrets.SONAR_ORGANIZATION }}"
          
          RAW_LIST_GATES=$(curl -s -u ${{ secrets.SONAR_TOKEN }}: "${{ secrets.SONAR_HOST_URL }}/api/qualitygates/list?organization=$SONAR_ORGANIZATION")
          QUALITY_GATE=$(echo "$RAW_LIST_GATES" | jq -r --arg gate_name "$GATE_NAME" '.qualitygates[] | select(.name == $gate_name)')
          GATE_ID=$(echo "$QUALITY_GATE" | jq -r '.id')
          echo "lista de gates: $QUALITY_GATE"

          EXIST_GATE=$(echo "$QUALITY_GATE" | jq -r '.name')
          if [ -z "$EXIST_GATE" ]; then
            echo "El Quality Gate '$GATE_NAME' no existe. Creándolo..."
            
            # Crear el Gate
            GATE_INFO=$(curl -s -u ${{ secrets.SONAR_TOKEN }}: -X POST \
              "${{ secrets.SONAR_HOST_URL }}/api/qualitygates/create" \
              -d "name=$GATE_NAME" \
              -d "organization=$SONAR_ORGANIZATION")
              
            echo "Respuesta de creación del Quality Gate: $GATE_INFO"
            echo "Quality Gate '$GATE_NAME' creado con éxito."
          else
            echo "El Quality Gate '$GATE_NAME' ya existe. Saltando creación."
          fi

           # Añadir condiciones (90% coverage y 5% duplicación)
            curl -s -u ${{ secrets.SONAR_TOKEN }}: -X POST \
              "${{ secrets.SONAR_HOST_URL }}/api/qualitygates/create_condition" \
              -d "gateId=$GATE_ID" \
              -d "organization=$SONAR_ORGANIZATION" \
              -d "metric=coverage" \
              -d "op=LT" \
              -d "error=90"
              
            curl -s -u ${{ secrets.SONAR_TOKEN }}: -X POST \
              "${{ secrets.SONAR_HOST_URL }}/api/qualitygates/create_condition" \
              -d "gateId=$GATE_ID" \
              -d "organization=$SONAR_ORGANIZATION" \
              -d "metric=duplicated_lines_density" \
              -d "op=GT" \
              -d "error=5"

      - name: debug
        run: |
            echo "REPO_NAME: $REPO_NAME"
    
